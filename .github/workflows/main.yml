name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./simple-java-maven-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn compile

      - name: Run Checkstyle
        run: mvn checkstyle:checkstyle

      - name: Run Tests
        run: mvn test

      - name: Package Project
        run: mvn package
